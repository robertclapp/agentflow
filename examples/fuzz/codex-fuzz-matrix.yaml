# Codex fuzz matrix starter
#
# This example uses `fanout.values` so each shard can carry its own target,
# sanitizer, seed, and corpus metadata without hand-written duplicate nodes.
#
# Usage:
#   agentflow init fuzz-matrix.yaml --template codex-fuzz-matrix
#   agentflow inspect examples/fuzz/codex-fuzz-matrix.yaml
#   agentflow run examples/fuzz/codex-fuzz-matrix.yaml --preflight never

name: codex-fuzz-matrix
description: Codex fuzz starter with per-shard values for targets, sanitizers, and seeds.
working_dir: ./codex_fuzz_matrix
concurrency: 8

nodes:
  - id: init
    agent: codex
    tools: read_write
    timeout_seconds: 60
    prompt: |
      Create the following directory structure silently if it does not already exist:
        mkdir -p docs crashes agents
      If crashes/README.md is missing or empty, create it with:
        # Crash Registry
        | Timestamp | Target | Sanitizer | Shard | Evidence |
        |---|---|---|---|---|
      If docs/campaign_notes.md is missing or empty, create it with:
        # Campaign Notes
        Use this file only for cross-shard lessons.
      Then respond with exactly: INIT_OK

    success_criteria:
      - kind: output_contains
        value: INIT_OK

  - id: fuzzer
    fanout:
      as: shard
      values:
        - target: libpng
          sanitizer: asan
          seed: 1101
          corpus: png
        - target: libpng
          sanitizer: ubsan
          seed: 1102
          corpus: png
        - target: libjpeg
          sanitizer: asan
          seed: 2201
          corpus: jpeg
        - target: libjpeg
          sanitizer: ubsan
          seed: 2202
          corpus: jpeg
        - target: freetype
          sanitizer: asan
          seed: 3301
          corpus: fonts
        - target: freetype
          sanitizer: ubsan
          seed: 3302
          corpus: fonts
        - target: sqlite
          sanitizer: asan
          seed: 4401
          corpus: sql
        - target: sqlite
          sanitizer: ubsan
          seed: 4402
          corpus: sql
    agent: codex
    model: gpt-5-codex
    tools: read_write
    depends_on: [init]
    target:
      kind: local
      cwd: agents/{{ shard.target }}_{{ shard.sanitizer }}_{{ shard.suffix }}
    timeout_seconds: 1800
    retries: 1
    retry_backoff_seconds: 2
    extra_args:
      - "--search"
    prompt: |
      You are Codex fuzz shard {{ shard.number }} of {{ shard.count }}.

      Campaign inputs:
      - Target: {{ shard.target }}
      - Sanitizer: {{ shard.sanitizer }}
      - Seed: {{ shard.seed }}
      - Corpus family: {{ shard.corpus }}
      - Workspace: agents/{{ shard.target }}_{{ shard.sanitizer }}_{{ shard.suffix }}

      Shard contract:
      - Stay within your shard workspace unless you are appending to the shared crash registry or notes.
      - Use the assigned target, sanitizer, and seed to keep the campaign reproducible.
      - Prefer high-signal crashers, assertion failures, memory safety bugs, or logic corruptions.
      - Record confirmed findings in `crashes/README.md` and copy minimal repro artifacts into `crashes/`.
      - Add short cross-shard lessons to `docs/campaign_notes.md` when they help other shards.

  - id: merge
    agent: codex
    model: gpt-5-codex
    tools: read_only
    depends_on: [fuzzer]
    timeout_seconds: 300
    prompt: |
      Consolidate this fuzz matrix into a maintainer handoff.
      Lead with confirmed or strongest suspected issues, then note repeated weak spots by target and sanitizer.

      {% for shard in fanouts.fuzzer.nodes %}
      ### {{ shard.id }} (status: {{ shard.status }})
      {{ shard.output or "(no output)" }}

      {% endfor %}
